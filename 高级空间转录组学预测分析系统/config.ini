# 空间转录组学深度学习分析 - 配置文件
# 修改此文件中的参数来定制你的分析

[data]
# 数据路径
data_path = ./visium_data/breast_cancer
use_filtered = true
n_top_genes = 2000

[preprocessing]
# 预处理参数
min_genes = 200           # 每个spot最少基因数
min_cells = 3             # 每个基因最少出现的spot数
target_sum = 10000        # 归一化目标总数
normalize_method = log1p  # 归一化方法: log1p, sqrt

[spatial_graph]
# 空间图构建
n_neighbors = 6           # 邻居数量
coord_type = grid         # 坐标类型: grid, generic
radius = 150              # 邻域半径 (用于连续空间)

[model_vae]
# VAE模型参数
spatial_dim = 128         # 空间嵌入维度
latent_dim = 32           # 潜在空间维度
hidden_dims = [512, 256, 128]  # 隐藏层维度
gnn_type = GAT            # GNN类型: GAT, GCN, SAGE
gat_heads = 4             # GAT注意力头数
dropout = 0.3             # Dropout率

[model_diffusion]
# 扩散模型参数
time_dim = 32             # 时间嵌入维度
hidden_dim = 256          # 隐藏层维度
n_steps = 50              # 去噪步数

[model_domain]
# 空间域发现模型
n_domains = 10            # 域的数量
hidden_dim = 128          # 隐藏层维度
pos_encoding_levels = 5   # 位置编码级别

[training_vae]
# VAE训练参数
epochs = 100              # 训练轮数
learning_rate = 0.001     # 学习率
beta = 0.001              # KL散度权重
batch_size = 0            # 批大小 (0=全批次)
optimizer = adam          # 优化器: adam, adamw, sgd
scheduler = plateau       # 学习率调度: plateau, step, cosine

[training_domain]
# 域发现训练参数
epochs = 50
learning_rate = 0.001
optimizer = adam

[prediction]
# 预测参数
n_new_spots = 100         # 预测的新位置数量
interpolation_method = diffusion  # 插值方法: diffusion, knn, gp

[analysis]
# 下游分析参数
de_method = wilcoxon      # 差异表达方法: wilcoxon, t-test
n_de_genes = 100          # 每组差异基因数
svg_method = moransi      # 空间可变基因方法: moransi, squidpy
n_svg = 50                # 空间可变基因数量
n_niches = 5              # 生态位数量

[visualization]
# 可视化参数
figure_dpi = 300          # 图片分辨率
colormap = viridis        # 颜色映射
spot_size = 50            # spot大小
alpha = 0.8               # 透明度

[output]
# 输出路径
output_dir = ./outputs
save_adata = true         # 保存AnnData对象
save_predictions = true   # 保存预测结果
save_figures = true       # 保存图片
save_reports = true       # 保存HTML报告

[advanced]
# 高级选项
use_gpu = true            # 使用GPU
gpu_id = 0                # GPU设备ID
mixed_precision = false   # 混合精度训练
random_seed = 42          # 随机种子
n_threads = 4             # 线程数
